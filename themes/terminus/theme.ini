[info]
name = Terminus

[colors]
; Deep phosphor black — CRT off-state
bg           = 040A04
; Slightly elevated dark green surface
accent       = 0A1A0A
; Selected row — military green
highlight    = 1A5A1A
; Bright phosphor green text
text         = 44FF44
; Dimmed phosphor green secondary text
text_dim     = 1A8A1A
; Progress bar and icons — phosphor green
progress     = 44FF44
; Visualizer bars — same phosphor green
vis_bar      = 44FF44
; Album art background — deep black-green
album_art_bg = 0A1A0A
; Visualizer info bar — dark green, 78% opacity
vis_overlay  = C8001400
; Album art phosphor green tint — 30% opacity wash
album_art_tint = 4D002800

[fonts]
font_0 = font.ttf

[sizes]
; VT323 is a pixel font — reads best at larger sizes
font_large  = 38
font_medium = 26
font_small  = 20

[layout]
; Sharp corners — retro CRT terminal feel
album_art_size          = 200
corner_radius           = 0
list_row_height         = 32
; Frame extends 12px beyond art edge to accommodate the bezel border
album_art_frame_padding = 12
