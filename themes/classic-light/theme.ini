[info]
name = Classic Light

[colors]
; iOS system light gray — same family as Classic Dark's bg
bg          = F2F2F7
; Pure white cards/surfaces
accent      = FFFFFF
; Soft gray for selected row — visible but not harsh
highlight   = E5E5EA
; Near-black — mirrors Classic Dark's bg color for text
text        = 1C1C1E
; Mid-gray secondary text — same value works on both light and dark
text_dim    = 8E8E93
; Keep Apple Music red — the signature accent
progress    = FC3C44
vis_bar     = FC3C44
; White placeholder for album art
album_art_bg= E5E5EA

[sizes]
font_large  = 32
font_medium = 23
font_small  = 19

[layout]
album_art_size  = 200
corner_radius   = 12
list_row_height = 30
